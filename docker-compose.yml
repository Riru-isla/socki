version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: socki
      POSTGRES_PASSWORD: socki
      POSTGRES_DB: socki_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socki -d socki_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://socki:socki@postgres:5432/socki_development
      REDIS_URL: redis://redis:6379/1
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-dummy}
    volumes:
      - ./backend:/rails
      - bundle_cache:/usr/local/bundle
      - rails_tmp:/rails/tmp
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "./bin/rails db:prepare && ./bin/rails server -b 0.0.0.0"

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      - NODE_ENV=development
      - API_PROXY_TARGET=http://backend:3000
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: >
      sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  bundle_cache:
  rails_tmp:
  node_modules:
