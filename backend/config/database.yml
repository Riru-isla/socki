default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  username: socki
  password: "<%= ENV.fetch('SOCKI_DATABASE_PASSWORD', 'socki') %>"
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>

# Each env has its own database. We deliberately do NOT read
# DATABASE_URL in development/test — when it was inherited via the
# default block, an exported DATABASE_URL aimed at socki_development
# bled into rspec and broke fixtures.
development:
  <<: *default
  database: socki_development

test:
  <<: *default
  database: socki_test

production:
  <<: *default
  database: socki_production
  password: "<%= ENV['SOCKI_DATABASE_PASSWORD'] %>"
  <% if ENV["DATABASE_URL"] %>
  url: <%= ENV["DATABASE_URL"] %>
  <% end %>
