default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

  # Docker Compose uses DATABASE_URL env var; fallback for local dev
  <% if ENV["DATABASE_URL"] %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  username: socki
  password: "<%= ENV.fetch('SOCKI_DATABASE_PASSWORD', 'socki') %>"
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  <% end %>

development:
  <<: *default
  database: socki_development

test:
  <<: *default
  database: socki_test

production:
  <<: *default
  database: socki_production
  username: socki
  password: "<%= ENV['SOCKI_DATABASE_PASSWORD'] %>"
